<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Hello world from OpenClaw—Third-Deploy</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(circle at top, #1e293b 0, #020617 55%);
      color: #e5e7eb;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: rgba(15, 23, 42, 0.9);
      border: 1px solid rgba(148, 163, 184, 0.4);
      border-radius: 18px;
      padding: 32px 40px;
      max-width: 480px;
      width: 100%;
      text-align: center;
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.6);
    }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: #a5b4fc;
      background: rgba(79, 70, 229, 0.18);
      border-radius: 999px;
      padding: 6px 14px;
      margin-bottom: 20px;
    }
    h1 { font-size: 28px; margin-bottom: 10px; color: #f9fafb; }
    p {
      font-size: 15px;
      line-height: 1.6;
      color: #cbd5f5;
      margin-bottom: 24px;
    }
    .footer { font-size: 12px; color: #9ca3af; opacity: 0.85; }
    .highlight { color: #fde68a; font-weight: 600; }
  </style>
</head>
<body>
  <main class="card">
    <div class="badge">
      OpenClaw
      <span>assistant demo</span>
    </div>
    <h1>Hello world from OpenClaw—Third-Deploy</h1>
    <p>
      This is a minimal one-page business card generated by an AI assistant.
      You can customize this text, add links, and turn it into your own landing page.
    </p>
    <div class="footer">
      Deployed by you, powered by <span class="highlight">OpenClaw</span>.
    </div>
  </main>
</body>
</html>
